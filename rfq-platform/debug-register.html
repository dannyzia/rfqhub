<!DOCTYPE html>
<html>
<head>
    <title>Debug Registration</title>
</head>
<body>
    <h1>Debug Registration Form</h1>
    <form id="registerForm">
        <div>
            <label>First Name:</label>
            <input type="text" id="firstName" value="Debug" required>
        </div>
        <div>
            <label>Last Name:</label>
            <input type="text" id="lastName" value="User" required>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" id="email" value="debug@example.com" required>
        </div>
        <div>
            <label>Password:</label>
            <input type="password" id="password" value="TestPassword123!" required>
        </div>
        <div>
            <label>Company:</label>
            <input type="text" id="companyName" value="Debug Company" required>
        </div>
        <div>
            <label>Role:</label>
            <select id="role">
                <option value="vendor">Vendor</option>
                <option value="buyer">Buyer</option>
            </select>
        </div>
        <button type="submit">Register</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                companyName: document.getElementById('companyName').value,
                role: document.getElementById('role').value
            };
            
            console.log('Sending data:', data);
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        '<h2 style="color: green;">✅ Registration Successful!</h2>' +
                        '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
                } else {
                    document.getElementById('result').innerHTML = 
                        '<h2 style="color: red;">❌ Registration Failed!</h2>' +
                        '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = 
                    '<h2 style="color: red;">❌ Network Error!</h2>' +
                    '<p>' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
